name: OpenAI Codex

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  codex:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@codex')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@codex')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@codex') || contains(github.event.issue.title, '@codex')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Resolve checkout ref
        id: context
        run: |
          python3 - <<'PY'
          import json
          import os

          event_name = os.environ["GITHUB_EVENT_NAME"]
          github_sha = os.environ["GITHUB_SHA"]

          with open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8") as f:
              event = json.load(f)

          checkout_ref = github_sha

          if event_name in {"pull_request_review_comment", "pull_request_review"}:
              pr = event.get("pull_request") or {}
              number = pr.get("number")
              if number is not None:
                  checkout_ref = f"refs/pull/{number}/merge"
          elif event_name == "issue_comment":
              issue = event.get("issue") or {}
              if issue.get("pull_request"):
                  checkout_ref = f"refs/pull/{issue['number']}/merge"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"checkout_ref={checkout_ref}\n")
          PY

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ steps.context.outputs.checkout_ref }}

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/github-mention.md
          output-file: codex-output.md
          model: gpt-5.3-codex
          effort: medium
          safety-strategy: drop-sudo
          sandbox: read-only

      - name: Post Codex feedback
        if: steps.run_codex.outputs.final-message != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const issueNumber =
              context.payload.issue?.number ?? context.payload.pull_request?.number;

            if (!issueNumber) {
              core.setFailed("Could not determine the issue or pull request number.");
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
